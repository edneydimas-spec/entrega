[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' https://api.anthropic.com https://nominatim.openstreetmap.org; media-src 'self' blob:; camera-src 'self'"
    Permissions-Policy = "camera=*, microphone=()"
    X-Frame-Options = "SAMEORIGIN"
